name: ci
on: [push, pull_request]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e . pytest
      - run: pytest -q

  package:
    # Build the WHEEL and run it from a clean install — not editable source. This is the check that would
    # have caught 0.2.0 shipping without rlsautotest.strategies. Tests the artifact users actually get.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build the wheel
        run: |
          python -m pip install --upgrade build
          python -m build --wheel
      - name: Install the built wheel into a clean venv and run it
        run: |
          python -m venv /tmp/clean
          /tmp/clean/bin/pip install dist/*.whl
          # cd OUTSIDE the source tree so the INSTALLED package is imported, not ./rlsautotest
          cd /tmp
          /tmp/clean/bin/rlsautotest --help
          /tmp/clean/bin/python -c "import rlsautotest.cli, rlsautotest.emit, rlsautotest.strategies; print('clean-install import OK')"

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Postgres + pgTAP
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql postgresql-contrib
          PGVER=$(pg_lsclusters -h | awk '{print $1; exit}')
          sudo apt-get install -y "postgresql-${PGVER}-pgtap" || sudo apt-get install -y pgtap || true
          sudo pg_ctlcluster "${PGVER}" main start || sudo service postgresql start
          sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'postgres';"
          sudo -u postgres createdb app
          sudo -u postgres psql -d app -c "CREATE EXTENSION IF NOT EXISTS pgtap;"
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e .
      - name: Generate and run the RLS suite
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/app
        run: |
          # load the example schemas that are expected to be green (owner-scoped + multi-tenant).
          # exotic.sql is intentionally NOT loaded here: it contains a deliberately broken policy to
          # demonstrate detection, so it is meant to fail the gate, not pass it.
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/schema.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/tenancy.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/rbac.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/rbac_tenant.sql # multi-tenant RBAC patterns: login-only INSERT + ownership trigger, multi-col unique + text[], array-cardinality CHECK, composite FK + FOR ALL w/o UPDATE grant + service_role USING(true) -> all must stay green
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/clearance.sql   # numeric-threshold; only the general solver can test it
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/synth.sql       # opaque-fn gate + composite FK + CHECK-UDF; only the probe-and-repair synthesizer can seed it
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/adversarial.sql # novel atoms OR'd with a classifiable branch; the per-min-term solver (BL-1) must DB-verify the novel branch
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/mockforce.sql   # opaque scalar fn in a comparison (fn()=const, fn()=fn()) -> force-mock wiring proof, must stay green
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/witness_himed.sql # bool col / NOT / IS TRUE / JSONB @>,? / BETWEEN / lower()/cast / cross-col -> all solver-tested, must stay green
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/witness_array.sql # WB-1: array overlap/containment (&&, @>, <@, reverse-order) -> solver-tested, must stay green
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/witness_fncol2.sql # WB-2: many-to-one fn-on-col (date_trunc/substring/left/to_char) preimage -> solver-tested, must stay green
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/witness_subq.sql  # WB-3: non-canonical subqueries (extra cond / two correlations / IN / NOT EXISTS) -> general subquery solver, must stay green
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/witness_novel.sql # BL-6: construct-first DB-oracle floor (starts_with / `%` / a CUSTOM operator) -> solved with ZERO operator-specific code, must stay green
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/witness_joint.sql # BL-11: joint signature search (two-column custom op + a claim under a custom op) -> session x multi-column search, must stay green
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/witness_cardinality.sql # BL-12: relational-state floor (count(*) >= K cardinality gate) -> seeds K rows + lets the DB evaluate the aggregate, must stay green
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/recursion.sql # VALID self-referential hierarchy (WITH RECURSIVE from owner=auth.uid(), read via a SECURITY DEFINER fn so RLS is not re-entered -> no 42P17) -> exercises the recursion strategy (synth_recursion_emit) on a GREEN path, must stay green. The broken counterpart lives in exotic.folders (excluded above).
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/exotic_types.sql # F3: NOT NULL columns of exotic types (inet/macaddr/bytea/DOMAIN) that the static value table cannot represent -> seeded by the DB-oracle _castable_lit; before F3 the row could not be built and the branch went UNRELIABLE, must stay green. Also xtypes.sensors: the same exotic types on a CLASSIFIED (owner-scoped) table -> the oracle-verified fill seeds it and the UPDATE probe SETs a castable value, must stay green
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/zeroarg.sql # F10: a ZERO-arg boolean fn whose body is a transparent JWT-claim check (is_admin()) -> introspected to a claim_const atom and tested FOR REAL (no [mocked; wiring] tags), must stay green
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/regexfree.sql # F6: a policy whose WITH CHECK contains a column NAME inside a string literal -> the AST (not a text regex) decides which columns the policy references, so the real neutral column stays SETtable and UPDATE is tested, must stay green
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/customrole.sql # F5: policies granted TO a custom role (reporter) -> probed via SET ROLE and shown as their own report row instead of silently vanishing from the client DNF, must stay green
          rc=0
          for schema in public tenancy rbac rbt clearance synth adversarial mockforce wm wa wf2 wsq wn wj wcard recursion xtypes za rxf crole; do
            echo "===== schema: $schema ====="
            rlsautotest --db-url "$DATABASE_URL" --schema "$schema" --emit "out_$schema"
            for f in "out_$schema"/tests/database/rls/*.sql; do
              echo "== $f =="
              psql "$DATABASE_URL" -v ON_ERROR_STOP=0 -f "$f" | tee /tmp/tap.txt
              grep -q '^ *not ok' /tmp/tap.txt && rc=1 || true
            done
            # Enforce the gate on the green set: a NEW hole, a cross-policy leak, or an UNRELIABLE cell
            # (a test whose seed/precondition silently stopped working) must fail CI here. This is the
            # coverage-regression guard -- the pg_prove loop above only catches 'not ok', not a cell that
            # silently dropped to "– not tested".
            rlsautotest --db-url "$DATABASE_URL" --schema "$schema" --report || rc=1
          done
          # BL-1 guard: the per-min-term solver must DB-verify the novel OR-branches in adversarial.sql
          # (e.g. `status <> 'deleted'`, `deleted_at IS NULL`). If the solver gets re-gated/regressed, these
          # [solver] tests vanish and the novel branch is silently dropped — fail CI if they're missing.
          grep -rq '\[solver\]' out_adversarial/tests/database/rls/ || { echo "FAIL: BL-1 produced no [solver] tests for adversarial — the novel branches were dropped"; rc=1; }
          rlsautotest --db-url "$DATABASE_URL" --schema adversarial --debug-unhandled   # show the classifier gaps for the record
          exit $rc
      - name: Catch the cross-policy WITH CHECK leak (examples/transitions.sql)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/app
        run: |
          # transitions.sql is a DELIBERATE leak (like exotic.sql): a role-gated status state machine
          # whose permissive UPDATE policies' WITH CHECK clauses OR-combine so a role can write a status
          # its own policy forbids. The gate MUST flag it (exit non-zero) — failing to is a regression
          # in either identity derivation (gap 1) or the transition audit (gap 2).
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/transitions.sql
          if rlsautotest --db-url "$DATABASE_URL" --schema transitions --report; then
            echo "FAIL: did NOT catch the known cross-policy WITH CHECK leak in transitions.work_items"
            exit 1
          fi
          echo "OK: cross-policy WITH CHECK leak detected (gate exited non-zero) as expected"
      - name: Flag an un-seedable table as UNRELIABLE, never a silent pass (examples/seedfail.sql)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/app
        run: |
          # seedfail.sql is DELIBERATELY un-seedable (a 10-digit CHECK the generic filler can't satisfy).
          # The engine must mark those cells UNRELIABLE and FAIL the gate (exit non-zero) rather than print
          # "– not tested" or bake the seed error as a policy denial. Failing to is a regression in the
          # probe's arrange/act split or the post-arrange invariant.
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/seedfail.sql
          # Capture the gate's REAL exit code without a pipe (a `... | tee file` pipeline reports tee's
          # exit 0 and MASKS the gate's non-zero exit) AND without tripping `set -e` (a bare
          # `cmd; rc=$?` aborts the step on the gate's expected exit 1 before rc is read). `|| rc=$?` is
          # exempt from set -e and records the real code; works under sh -e and bash -eo pipefail.
          rc=0
          rlsautotest --db-url "$DATABASE_URL" --schema seedfail --report > /tmp/sf.txt 2>&1 || rc=$?
          cat /tmp/sf.txt
          if [ "$rc" -eq 0 ]; then
            echo "FAIL: an un-seedable table did NOT fail the gate"
            exit 1
          fi
          grep -q "UNRELIABLE" /tmp/sf.txt || { echo "FAIL: expected an UNRELIABLE call-out"; exit 1; }
          echo "OK: un-seedable table flagged UNRELIABLE and gated as expected"
      - name: UPDATE probe correctness — neutral col / valid value / explained dash (examples/updcheck.sql)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/app
        run: |
          # The UPDATE probe must SET a policy-NEUTRAL column to a CONSTRAINT-VALID value. updcheck.sql
          # stresses the three failure modes: t1 (value-set CHECK -> valid value -> tested), t2 (CHECK the
          # filler can't satisfy -> UNRELIABLE, never a false "denied"), t3 (no neutral column -> explained
          # "–"). The gate must flag it (t2 UNRELIABLE), and the no-neutral-column note must appear (t3).
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/updcheck.sql
          # `|| rc=$?` (not a pipe, not a bare `; rc=$?`) so we capture the gate's real exit without
          # tee-masking it and without `set -e` aborting the step on the expected non-zero. See seedfail step.
          rc=0
          rlsautotest --db-url "$DATABASE_URL" --schema updcheck --report > /tmp/uc.txt 2>&1 || rc=$?
          cat /tmp/uc.txt
          if [ "$rc" -eq 0 ]; then
            echo "FAIL: updcheck did not fail the gate (expected t2 UNRELIABLE)"
            exit 1
          fi
          grep -q "UNRELIABLE" /tmp/uc.txt || { echo "FAIL: expected UNRELIABLE for the CHECK-violating UPDATE (t2)"; exit 1; }
          grep -q "no policy-neutral column" /tmp/uc.txt || { echo "FAIL: expected the explained '–' note (t3)"; exit 1; }
          echo "OK: UPDATE probe correctness guards held (neutral column, valid value, UNRELIABLE, explained dash)"
      - name: Implicit-deny (--implicit-deny) governs the full command matrix (examples/witness_himed.sql)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/app
        run: |
          # wm tables are SELECT-only policies, so INSERT/UPDATE/DELETE are RLS deny-by-default. With
          # --implicit-deny the emitted suite must ADD passing deny tests for those no-policy commands (full
          # command-matrix governance). Assert the deny tests appear AND the suite stays green (no 'not ok').
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f examples/witness_himed.sql
          rlsautotest --db-url "$DATABASE_URL" --schema wm --emit out_wm_idn --implicit-deny
          found=0; rc=0
          for f in out_wm_idn/tests/database/rls/*.sql; do
            psql "$DATABASE_URL" -v ON_ERROR_STOP=0 -f "$f" > /tmp/idn.tap 2>&1 || true
            grep -q '^ *not ok' /tmp/idn.tap && rc=1 || true
            grep -q 'implicit deny' /tmp/idn.tap && found=1 || true
          done
          if [ "$found" -ne 1 ]; then echo "FAIL: --implicit-deny emitted no deny tests"; exit 1; fi
          if [ "$rc" -ne 0 ]; then echo "FAIL: implicit-deny suite had a failing test"; exit 1; fi
          echo "OK: --implicit-deny added passing deny tests for no-policy commands"
